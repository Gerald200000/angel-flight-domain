<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angel's Flight</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #05050f, #0a0a2e, #1a1060);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    h1 { font-size: 2.5rem; color: #ffd700; letter-spacing: 4px; text-transform: uppercase; }
    p { color: #ffffffaa; margin: 16px 0 32px; font-size: 1rem; line-height: 1.7; max-width: 480px; }
    a {
      display: inline-block;
      color: #ffd700;
      border: 1px solid #ffd700;
      padding: 12px 32px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    a:hover { background: rgba(255,215,0,0.1); }
    .cross { font-size: 3rem; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="cross">✝</div>
  <h1>Angel's Flight</h1>
  <p>A Christian mobile game. Fly with faith through the heavenly gates.</p>
  <a href="privacy-policy.html">Privacy Policy</a>
</body>
</html>
